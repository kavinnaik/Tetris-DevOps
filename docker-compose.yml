version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: tetris-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  backend:
    image: tetris-backend
    container_name: tetris-backend
    ports:
      - "5000:5000"
    environment:
      - MONGO_URI=mongodb://mongodb:27017/tetris
      - PORT=5000
    depends_on:
      - mongodb

  frontend:
    image: tetris-frontend
    container_name: tetris-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mongo-data:
